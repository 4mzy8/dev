<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORIZURU TOWER | Executive Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', 'Shippori Mincho', serif;
            background-color: #fcfbf9;
            color: #4a4a4a;
        }

        .theme-wood { color: #8B5E3C; }
        .bg-theme-wood { background-color: #8B5E3C; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(139, 94, 60, 0.15);
            box-shadow: 0 4px 15px -1px rgba(139, 94, 60, 0.05);
            backdrop-filter: blur(8px);
        }

        .font-jp {
            font-family: 'Shippori Mincho', serif;
        }

        .period-btn {
            transition: all 0.3s ease;
        }

        .period-btn.active {
            background-color: #8B5E3C;
            color: white;
            border-color: #8B5E3C;
        }

        .period-btn:not(.active):hover {
            background-color: #f3ece7;
            color: #8B5E3C;
        }

        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .plan-label {
            font-size: 11px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .plan-value {
            font-size: 15px;
            font-weight: bold;
            color: #374151;
        }
    </style>
</head>

<body class="bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] flex flex-col min-h-screen">

<header class="bg-white/80 backdrop-blur-md border-b border-[#8B5E3C]/20 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20 items-center">

            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-theme-wood rounded-tr-xl rounded-bl-xl flex items-center justify-center text-white shadow-md">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="1.5"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 12h10v10l10-10H12V2z"/>
                    </svg>
                </div>

                <div>
                    <h1 class="text-2xl font-jp font-bold tracking-widest text-[#5e4028]">
                        おりづるタワー
                    </h1>

                    <p class="text-[10px] text-[#8B5E3C] uppercase tracking-widest font-sans">
                        Management Dashboard
                    </p>
                </div>
            </div>

            <div class="flex items-center gap-6">

                <!-- 月次・年次 -->
                <div class="flex bg-[#f3ece7] p-1 rounded-lg border border-[#e0d6ce]">
                    <button onclick="updateDashboard('monthly')" id="btn-monthly"
                            class="period-btn active px-6 py-1.5 text-xs font-bold rounded-md border border-transparent">
                        月次
                    </button>

                    <button onclick="updateDashboard('yearly')" id="btn-yearly"
                            class="period-btn px-6 py-1.5 text-xs font-bold rounded-md border border-transparent text-[#8B5E3C]">
                        年次
                    </button>
                </div>

                <!-- 日付 -->
                <input type="date"
                       id="target-date"
                       onchange="refreshDashboard()"
                       class="border border-gray-300 rounded-lg px-3 py-2 text-sm">

                <div class="text-right hidden md:block">
                    <div class="text-sm font-bold text-gray-700 font-jp"
                         id="current-date-display">
                    </div>
                </div>

            </div>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8 flex-grow">

    <!-- 展望台 -->
    <section class="fade-in" style="animation-delay: 0.1s;">
        <div class="flex items-center gap-2 mb-4">
            <span class="w-1 h-6 bg-theme-wood"></span>

            <h2 class="text-xl font-jp font-bold text-[#5e4028]">
                展望台エリア
                <span class="text-sm font-normal text-gray-500 ml-2">
                    Observatory Performance
                </span>
            </h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- 売上 -->
            <div class="glass-panel p-6 rounded-xl border-t-4 border-[#D65A31] flex flex-col">

                <div class="text-center mb-4">
                    <div class="text-sm text-gray-500 font-bold uppercase mb-2">
                        売上
                    </div>

                    <div class="text-4xl font-bold text-gray-800 font-sans tracking-tight"
                         id="obs-total-sales">
                    </div>
                </div>

                <div class="pt-3 border-t border-dashed border-gray-200">

                    <div class="grid grid-cols-2 gap-2 text-center mb-3">

                        <div>
                            <div class="text-[10px] text-gray-400 mb-1">
                                計画値
                            </div>

                            <div class="text-sm font-bold text-gray-700 font-sans"
                                 id="obs-sales-target">
                            </div>
                        </div>

                        <div class="border-l border-gray-100">
                            <div class="text-[10px] text-gray-400 mb-1">
                                達成率
                            </div>

                            <div class="text-sm font-bold text-[#D65A31] font-sans"
                                 id="obs-sales-rate">
                            </div>
                        </div>

                    </div>

                    <div class="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
                        <div id="obs-sales-bar"
                             class="bg-[#D65A31] h-2 rounded-full transition-all duration-500">
                        </div>
                    </div>

                </div>
            </div>

            <!-- 入場者数 -->
            <div class="glass-panel p-6 rounded-xl border-t-4 border-[#2563eb] flex flex-col">

                <div class="text-center mb-4">
                    <div class="text-sm text-gray-500 font-bold uppercase mb-2">
                        入場者数
                    </div>

                    <div class="text-4xl font-bold text-gray-800 font-sans tracking-tight"
                         id="obs-total-visitors">
                    </div>
                </div>

                <div class="pt-3 border-t border-dashed border-gray-200">

                    <div class="grid grid-cols-2 gap-2 text-center mb-3">

                        <div>
                            <div class="text-[10px] text-gray-400 mb-1">
                                計画値
                            </div>

                            <div class="text-sm font-bold text-gray-700 font-sans"
                                 id="obs-visitors-target">
                            </div>
                        </div>

                        <div class="border-l border-gray-100">
                            <div class="text-[10px] text-gray-400 mb-1">
                                達成率
                            </div>

                            <div class="text-sm font-bold text-[#2563eb] font-sans"
                                 id="obs-visitors-rate">
                            </div>
                        </div>

                    </div>

                    <div class="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
                        <div id="obs-visitors-bar"
                             class="bg-[#2563eb] h-2 rounded-full transition-all duration-500">
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </section>

    <!-- IPPIN -->
    <section class="fade-in" style="animation-delay: 0.2s;">

        <div class="flex items-center gap-2 mb-4 pt-4 border-t border-dashed border-gray-300">
            <span class="w-1 h-6 bg-[#6b8c42]"></span>

            <h2 class="text-xl font-jp font-bold text-[#5e4028]">
                物産館 IPPIN
                <span class="text-sm font-normal text-gray-500 ml-2">
                    Retail Performance
                </span>
            </h2>
        </div>

        <!-- 元の横棒グラフ -->
        <div class="glass-panel p-6 rounded-xl mb-6">
            <div class="h-40">
                <canvas id="chartIppinCompare"></canvas>
            </div>
        </div>

        <!-- 店舗カード -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- 本店 -->
            <div class="glass-panel p-0 rounded-xl overflow-hidden">

                <div class="bg-[#5e4028] p-3 flex justify-between items-center text-white">
                    <div class="font-jp font-bold text-lg">
                        おりづるタワー本店
                    </div>

                    <div class="text-xs opacity-75">
                        HIROSHIMA
                    </div>
                </div>

                <div class="p-5 space-y-4">

                    <div class="flex justify-between items-end border-b border-dashed border-gray-200 pb-2">
                        <span class="text-xs text-gray-500">売上</span>

                        <span class="text-2xl font-bold text-[#5e4028] font-sans"
                              id="ippin-honten-sales">
                        </span>
                    </div>

                    <div class="grid grid-cols-2 gap-4">

                        <div>
                            <div class="plan-label">計画値</div>
                            <div class="plan-value" id="ippin-honten-plan"></div>
                        </div>

                        <div>
                            <div class="plan-label">達成率</div>
                            <div class="plan-value text-[#D65A31]" id="ippin-honten-rate"></div>
                        </div>

                    </div>

                    <div class="grid grid-cols-3 gap-2 text-center">

                        <div>
                            <div class="text-[10px] text-gray-400">粗利率</div>
                            <div class="font-bold text-gray-700" id="ippin-honten-gp"></div>
                        </div>

                        <div class="border-l border-gray-100">
                            <div class="text-[10px] text-gray-400">客数</div>
                            <div class="font-bold text-gray-700" id="ippin-honten-cust"></div>
                        </div>

                        <div class="border-l border-gray-100">
                            <div class="text-[10px] text-gray-400">客単価</div>
                            <div class="font-bold text-[#D65A31]" id="ippin-honten-avg"></div>
                        </div>

                    </div>

                </div>
            </div>

            <!-- KITTE -->
            <div class="glass-panel p-0 rounded-xl overflow-hidden">

                <div class="bg-[#1e40af] p-3 flex justify-between items-center text-white">
                    <div class="font-jp font-bold text-lg">
                        KITTE大阪店
                    </div>

                    <div class="text-xs opacity-75">
                        OSAKA
                    </div>
                </div>

                <div class="p-5 space-y-4">

                    <div class="flex justify-between items-end border-b border-dashed border-gray-200 pb-2">
                        <span class="text-xs text-gray-500">売上</span>

                        <span class="text-2xl font-bold text-[#1e40af] font-sans"
                              id="ippin-kitte-sales">
                        </span>
                    </div>

                    <div class="grid grid-cols-2 gap-4">

                        <div>
                            <div class="plan-label">計画値</div>
                            <div class="plan-value" id="ippin-kitte-plan"></div>
                        </div>

                        <div>
                            <div class="plan-label">達成率</div>
                            <div class="plan-value text-[#D65A31]" id="ippin-kitte-rate"></div>
                        </div>

                    </div>

                    <div class="grid grid-cols-3 gap-2 text-center">

                        <div>
                            <div class="text-[10px] text-gray-400">粗利率</div>
                            <div class="font-bold text-gray-700" id="ippin-kitte-gp"></div>
                        </div>

                        <div class="border-l border-gray-100">
                            <div class="text-[10px] text-gray-400">客数</div>
                            <div class="font-bold text-gray-700" id="ippin-kitte-cust"></div>
                        </div>

                        <div class="border-l border-gray-100">
                            <div class="text-[10px] text-gray-400">客単価</div>
                            <div class="font-bold text-[#D65A31]" id="ippin-kitte-avg"></div>
                        </div>

                    </div>

                </div>
            </div>

            <!-- 三の丸 -->
            <div class="glass-panel p-0 rounded-xl overflow-hidden">

                <div class="bg-[#4d7c0f] p-3 flex justify-between items-center text-white">
                    <div class="font-jp font-bold text-lg">
                        広島城三の丸店
                    </div>

                    <div class="text-xs opacity-75">
                        CASTLE
                    </div>
                </div>

                <div class="p-5 space-y-4">

                    <div class="flex justify-between items-end border-b border-dashed border-gray-200 pb-2">
                        <span class="text-xs text-gray-500">売上</span>

                        <span class="text-2xl font-bold text-[#4d7c0f] font-sans"
                              id="ippin-sanno-sales">
                        </span>
                    </div>

                    <div class="grid grid-cols-2 gap-4">

                        <div>
                            <div class="plan-label">計画値</div>
                            <div class="plan-value" id="ippin-sanno-plan"></div>
                        </div>

                        <div>
                            <div class="plan-label">達成率</div>
                            <div class="plan-value text-[#D65A31]" id="ippin-sanno-rate"></div>
                        </div>

                    </div>

                    <div class="grid grid-cols-3 gap-2 text-center">

                        <div>
                            <div class="text-[10px] text-gray-400">粗利率</div>
                            <div class="font-bold text-gray-700" id="ippin-sanno-gp"></div>
                        </div>

                        <div class="border-l border-gray-100">
                            <div class="text-[10px] text-gray-400">客数</div>
                            <div class="font-bold text-gray-700" id="ippin-sanno-cust"></div>
                        </div>

                        <div class="border-l border-gray-100">
                            <div class="text-[10px] text-gray-400">客単価</div>
                            <div class="font-bold text-[#D65A31]" id="ippin-sanno-avg"></div>
                        </div>

                    </div>

                </div>
            </div>

        </div>
    </section>

</main>

<footer class="bg-gray-100 border-t border-gray-200 py-6 mt-8">
    <div class="max-w-7xl mx-auto px-4 text-center">

        <p class="text-sm text-gray-500 font-bold bg-yellow-100 inline-block px-4 py-2 rounded-full border border-yellow-200">
            ⚠️ 開発中のモックです。数値はダミーです。
        </p>

    </div>
</footer>

<script>

    Chart.defaults.font.family =
        "'Inter', 'Shippori Mincho', sans-serif";

    Chart.defaults.color = '#6b7280';

    const C_HONTEN = '#5e4028';
    const C_KITTE = '#1e40af';
    const C_SANNO = '#4d7c0f';

    let charts = {};
    let currentPeriod = 'monthly';

    // 日付初期化
    const today = new Date();
    document.getElementById('target-date').value =
        today.toISOString().split('T')[0];

    // ランダム
    const rand = (min, max) =>
        Math.floor(Math.random() * (max - min + 1)) + min;

    // フォーマット
    const fmtYen = (num) =>
        '¥' + Math.round(num).toLocaleString();

    const fmtNum = (num) =>
        Math.round(num).toLocaleString();

    // 展望台データ
    function getObsData(period) {

        const base = period === 'monthly' ? 1 : 12;

        const sales = rand(1100000, 1800000) * base;
        const salesPlan = sales * (1 + (Math.random() * 0.25));

        const visitors = rand(700, 1300) * base;
        const visitorsPlan = visitors * (1 + (Math.random() * 0.2));

        return {
            sales,
            salesPlan,
            visitors,
            visitorsPlan
        };
    }

    // IPPINデータ
    function getIppinData(period) {

        const base = period === 'monthly' ? 1 : 12;

        return {

            honten: {
                sales: rand(700000, 1000000) * base,
                plan: rand(850000, 1100000) * base,
                gp: rand(38, 52),
                cust: rand(100, 180) * base
            },

            kitte: {
                sales: rand(500000, 850000) * base,
                plan: rand(650000, 900000) * base,
                gp: rand(35, 48),
                cust: rand(80, 140) * base
            },

            sanno: {
                sales: rand(300000, 550000) * base,
                plan: rand(380000, 650000) * base,
                gp: rand(30, 45),
                cust: rand(120, 240) * base
            }
        };
    }

    // 元の横棒グラフ
    function renderIppinChart(ctx, d) {

        return new Chart(ctx, {

            type: 'bar',

            data: {

                labels: [
                    '本店',
                    'KITTE大阪',
                    '広島城三の丸'
                ],

                datasets: [{
                    label: '売上高',

                    data: [
                        d.honten.sales,
                        d.kitte.sales,
                        d.sanno.sales
                    ],

                    backgroundColor: [
                        C_HONTEN,
                        C_KITTE,
                        C_SANNO
                    ],

                    borderRadius: 6,
                    barThickness: 40
                }]
            },

            options: {

                indexAxis: 'y',

                responsive: true,
                maintainAspectRatio: false,

                plugins: {
                    legend: {
                        display: false
                    }
                },

                scales: {

                    x: {
                        grid: {
                            color: '#f3f4f6'
                        },

                        ticks: {
                            callback: v =>
                                '¥' + v.toLocaleString()
                        }
                    },

                    y: {
                        grid: {
                            display: false
                        },

                        ticks: {
                            font: {
                                family: "'Shippori Mincho', serif",
                                size: 14,
                                weight: 'bold'
                            }
                        }
                    }
                }
            }
        });
    }

    // ダッシュボード更新
    function updateDashboard(period) {

        currentPeriod = period;

        document.querySelectorAll('.period-btn').forEach(b => {

            b.classList.remove(
                'active',
                'text-white',
                'bg-[#8B5E3C]'
            );

            b.classList.add('text-[#8B5E3C]');
        });

        const btn =
            document.getElementById('btn-' + period);

        if (btn) {

            btn.classList.add(
                'active',
                'text-white',
                'bg-[#8B5E3C]'
            );

            btn.classList.remove('text-[#8B5E3C]');
        }

        const obsD = getObsData(period);
        const ippinD = getIppinData(period);

        // 日付表示
        const targetDate =
            document.getElementById('target-date').value;

        document.getElementById('current-date-display').textContent =
            targetDate;

        // 展望台
        document.getElementById('obs-total-sales').textContent =
            fmtYen(obsD.sales);

        document.getElementById('obs-sales-target').textContent =
            fmtYen(obsD.salesPlan);

        const salesRate =
            (obsD.sales / obsD.salesPlan) * 100;

        document.getElementById('obs-sales-rate').textContent =
            salesRate.toFixed(1) + '%';

        document.getElementById('obs-sales-bar').style.width =
            Math.min(salesRate, 100) + '%';

        document.getElementById('obs-total-visitors').innerHTML =
            fmtNum(obsD.visitors) +
            '<span class="text-xl text-gray-500 ml-1">名</span>';

        document.getElementById('obs-visitors-target').innerHTML =
            fmtNum(obsD.visitorsPlan) + '名';

        const visitorsRate =
            (obsD.visitors / obsD.visitorsPlan) * 100;

        document.getElementById('obs-visitors-rate').textContent =
            visitorsRate.toFixed(1) + '%';

        document.getElementById('obs-visitors-bar').style.width =
            Math.min(visitorsRate, 100) + '%';

        // グラフ
        if (charts['ippinCompare']) {
            charts['ippinCompare'].destroy();
        }

        charts['ippinCompare'] = renderIppinChart(
            document.getElementById('chartIppinCompare').getContext('2d'),
            ippinD
        );

        // 店舗カード
        const updateCard = (store, data) => {

            const avg =
                Math.round(data.sales / data.cust);

            const rate =
                (data.sales / data.plan) * 100;

            document.getElementById(`ippin-${store}-sales`).textContent =
                fmtYen(data.sales);

            document.getElementById(`ippin-${store}-plan`).textContent =
                fmtYen(data.plan);

            document.getElementById(`ippin-${store}-rate`).textContent =
                rate.toFixed(1) + '%';

            document.getElementById(`ippin-${store}-gp`).textContent =
                data.gp + '%';

            document.getElementById(`ippin-${store}-cust`).textContent =
                fmtNum(data.cust);

            document.getElementById(`ippin-${store}-avg`).textContent =
                fmtYen(avg);
        };

        updateCard('honten', ippinD.honten);
        updateCard('kitte', ippinD.kitte);
        updateCard('sanno', ippinD.sanno);
    }

    // 日付変更時
    function refreshDashboard() {
        updateDashboard(currentPeriod);
    }

    // 初期表示
    window.addEventListener('load', () => {
        updateDashboard('monthly');
    });

</script>

</body>
</html>
